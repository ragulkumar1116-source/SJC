<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Photo Gallery</title><style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,120px);
    gap:12px;
    justify-content:center;
}

.box{
    background:#fff;
    border:1px solid #ddd;
    padding:5px;
    border-radius:6px;
    transition:0.2s;
}

.box:hover{
    transform:scale(1.05);
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.box img{
    width:100%;
    height:100px;
    object-fit:cover;
}

.label{
    font-size:12px;
    margin-top:4px;
}

</style></head><body><h1>All Student Photos (2018 - 2025)</h1><div class="gallery" id="gallery"></div><script>

const gallery = document.getElementById("gallery")

function addImages(folder,prefix,start,end){

for(let i=start;i<=end;i++){

let imgNumber = prefix + i
let url = "https://sjctni.edu/images/SPhotos/"+folder+"/"+imgNumber+".jpg"

let box = document.createElement("div")
box.className="box"

let link = document.createElement("a")
link.href = url
link.target="_blank"
link.download = imgNumber + ".jpg"

let img = document.createElement("img")
img.src = url

let label = document.createElement("div")
label.className="label"
label.innerText = imgNumber

link.appendChild(img)
box.appendChild(link)
box.appendChild(label)

gallery.appendChild(box)

}

}

for(let year=18; year<=25; year++){

let y = year.toString()

addImages(y, y+"uel",501,540)
addImages(y, y+"ust",101,189)
addImages(y, y+"ucr",501,580)

}
</script></body>
